<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#f0f0f0;display:flex;justify-content:center;}
#app{width:100%;max-width:390px;background:#fff;}
.scr{display:none;min-height:100vh;padding:20px;}
</style>
</head>
<body>
<div id="app">
  <div class="scr" id="s1" style="display:block;">
    <p style="margin-bottom:20px;">画面1です</p>
    <button onclick="goTo('s2')" style="padding:16px 32px;background:#4a7de8;color:#fff;border:none;border-radius:12px;font-size:16px;touch-action:manipulation;">次の画面へ</button>
  </div>
  <div class="scr" id="s2">
    <p style="margin-bottom:20px;">画面2です！</p>
    <button onclick="goTo('s1')" style="padding:16px 32px;background:#4a7de8;color:#fff;border:none;border-radius:12px;font-size:16px;touch-action:manipulation;">戻る</button>
  </div>
</div>
<script>
function goTo(id){
  var all=document.querySelectorAll('.scr');
  for(var i=0;i<all.length;i++){all[i].style.display='none';}
  document.getElementById(id).style.display='block';
}
</script>
</body>
</html>
